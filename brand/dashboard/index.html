<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your brand portal · Demohub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --forest-900:#0f2c17; --forest-700:#1f4a26; --forest-500:#3a7142; --forest-100:#e3edd6; --forest-50:#f4f7ef; --cream-50:#fbf7f0; --cream-100:#f6f0e4; --clay-700:#a14e2a; --clay-bright:#ed682f; --ink-900:#1c1c1a; --ink-700:#3a3a36; --ink-500:#6b6a64; }

        /* Universal caret suppression - text cursor only on real inputs */
        * { caret-color: transparent; }
        input:not([readonly]):not([disabled]):not([type="checkbox"]):not([type="radio"]):not([type="submit"]):not([type="button"]),
        textarea:not([readonly]):not([disabled]),
        [contenteditable="true"] { caret-color: auto; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Plus Jakarta Sans',-apple-system,sans-serif; background:var(--cream-50); color:var(--ink-900); line-height:1.55; min-height:100vh; }

/* ===== Top Nav ===== */
.nav { padding:16px 32px; display:flex; align-items:center; gap:24px; background:rgba(255,255,255,0.92); backdrop-filter:blur(20px); border-bottom:1px solid rgba(15,44,23,0.1); position:sticky; top:0; z-index:50; }
.nav .brand { display:flex; align-items:center; gap:10px; text-decoration:none; flex-shrink:0; ; cursor:pointer; user-select:none;}
.nav .brand-mark { width:28px; height:28px; }
.nav .brand-text { font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; font-size:1.1rem; letter-spacing:-0.04em; color:var(--forest-900); }
.nav-tabs { display:flex; gap:4px; flex:1; justify-content:center; }
.nav-tab { padding:8px 16px; background:transparent; border:none; border-radius:99px; font-family:inherit; font-size:0.92rem; font-weight:600; color:var(--ink-700); cursor:pointer; transition:all 0.15s; text-decoration:none; display:inline-block; }
.nav-tab:hover { background:var(--cream-100); color:var(--forest-900); }
.nav-tab.active { background:var(--forest-900); color:white; }
.nav-account { display:flex; align-items:center; gap:12px; flex-shrink:0; }
.nav-avatar { width:36px; height:36px; border-radius:50%; background:var(--cream-100); overflow:hidden; display:flex; align-items:center; justify-content:center; border:1.5px solid rgba(15,44,23,0.1); position:relative; cursor:pointer; transition: outline 0.15s, outline-offset 0.15s; outline: 1.5px dashed transparent; outline-offset: 1px; }
.nav-avatar:hover { outline: 1.5px dashed var(--forest-700); outline-offset: 2px; }
.nav-avatar .avatar-upload-overlay { position:absolute; inset:0; border-radius:50%; background:rgba(15,44,23,0.55); color:white; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.15s; pointer-events:none; }
.nav-avatar .avatar-upload-overlay svg { width:40%; height:40%; display:block; }
.nav-avatar:hover .avatar-upload-overlay { opacity:1; }
.nav-avatar img { width:100%; height:100%; object-fit:cover; }
.nav-avatar svg { width:36px; height:36px; display:block; }
.nav-name { font-size:0.92rem; color:var(--forest-900); font-weight:600; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; padding:2px 6px; border-radius:5px; transition:background 0.15s; }
.nav-name:hover:not([contenteditable="true"]) { background: rgba(15,44,23,0.05); }
.nav-name[contenteditable="true"] { background: var(--cream-50); outline: 2px solid var(--forest-700); outline-offset: 2px; text-overflow: clip; max-width: none; }
/* Mobile hamburger nav */
.nav-mobile-toggle { display:none; background:transparent; border:1px solid rgba(15,44,23,0.12); border-radius:10px; padding:6px 10px; cursor:pointer; align-items:center; gap:6px; font-family:inherit; font-weight:600; font-size:0.82rem; color:var(--forest-900); }
.nav-mobile-toggle:hover { background:var(--cream-100); }
.nav-mobile-drawer { display:none; position:fixed; top:0; right:0; height:100vh; width:280px; max-width:85vw; background:white; box-shadow:-4px 0 20px rgba(15,44,23,0.15); z-index:9995; transform:translateX(100%); transition:transform 0.25s ease-out; padding:24px 18px; overflow-y:auto; }
.nav-mobile-drawer.open { display:block; transform:translateX(0); }
.nav-mobile-backdrop { display:none; position:fixed; inset:0; background:rgba(15,44,23,0.45); z-index:9994; opacity:0; transition:opacity 0.25s; }
.nav-mobile-backdrop.open { display:block; opacity:1; }
.nav-mobile-drawer-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid rgba(15,44,23,0.08); }
.nav-mobile-drawer a { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:10px; text-decoration:none; color:var(--forest-900); font-weight:600; font-size:0.95rem; margin-bottom:4px; transition:background 0.15s; }
.nav-mobile-drawer a:hover { background:var(--cream-100); }
.nav-mobile-drawer a.active { background:var(--forest-900); color:white; }
@media (max-width:760px) {
  .nav { padding:14px 18px; gap:10px; }
  .nav-tabs { display:none !important; }
  .nav-mobile-toggle { display:inline-flex; margin-left:auto; }
  .nav-name { display:none; }
  .nav-account { gap:8px; }
}

/* ===== Layout ===== */
.container { max-width:1100px; margin:32px auto 80px; padding:0 24px; }
.page-head { margin-bottom:28px; display:flex; justify-content:space-between; align-items:flex-end; gap:24px; flex-wrap:wrap; }
.page-head h1 { font-family:'Plus Jakarta Sans', sans-serif; font-size:2.4rem; font-weight:400; line-height:1.1; color:var(--forest-900); margin-bottom:8px; }
.page-head .sub { color:var(--ink-700); font-size:1rem; }

/* ===== Stats ===== */
.stat-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:24px; }
.stat { background:white; border:1px solid rgba(15,44,23,0.08); border-radius:12px; padding:18px 20px; }
.stat-num { font-family:'Plus Jakarta Sans', sans-serif; font-size:2rem; color:var(--forest-900); font-weight:400; line-height:1; margin-bottom:6px; }
.stat-lbl { font-size:0.82rem; color:var(--ink-500); text-transform:uppercase; letter-spacing:0.05em; font-weight:600; }

/* ===== Cards ===== */
.card { background:white; border:1px solid rgba(15,44,23,0.08); border-radius:14px; padding:24px 26px; margin-bottom:24px; }
.card h2 { font-family:'Plus Jakarta Sans', sans-serif; font-size:1.45rem; font-weight:400; color:var(--forest-900); margin-bottom:6px; }
.card .sub { font-size:0.88rem; color:var(--ink-500); margin-bottom:18px; }

/* ===== Performance ===== */
.perf-stats { display:grid; grid-template-columns:repeat(3, 1fr); gap:18px; margin-bottom:18px; padding-bottom:18px; border-bottom:1px solid rgba(15,44,23,0.06); }
.perf-stat .val { font-family:'Plus Jakarta Sans', sans-serif; font-size:1.7rem; color:var(--forest-900); font-weight:400; line-height:1; margin-bottom:4px; }
.perf-stat .lbl { font-size:0.75rem; color:var(--ink-500); text-transform:uppercase; letter-spacing:0.05em; font-weight:600; }
.perf-chart { display:flex; align-items:flex-end; gap:8px; height:140px; }
.perf-chart .bar-col { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:6px; min-width:0; }
.perf-chart .bar { width:100%; background:var(--forest-500); border-radius:6px 6px 0 0; transition:height 0.6s cubic-bezier(0.22,1,0.36,1); min-height:2px; position:relative; }
.perf-chart .bar:hover { background:var(--forest-700); }
.perf-chart .bar .bar-val { position:absolute; top:-22px; left:50%; transform:translateX(-50%); font-size:0.78rem; color:var(--forest-900); font-weight:600; }
.perf-chart .bar-lbl { font-size:0.72rem; color:var(--ink-500); text-transform:uppercase; letter-spacing:0.04em; font-weight:600; }

/* ===== Your retailers ===== */
.retailer-row { display:flex; align-items:center; gap:16px; padding:14px 0; border-bottom:1px solid rgba(15,44,23,0.06); flex-wrap:wrap; }
.retailer-row:last-child { border-bottom:0; }
.retailer-info { flex:1; min-width:0; }
.retailer-name-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:4px; }
.retailer-name { font-weight:600; font-size:0.98rem; color:var(--forest-900); }
.retailer-meta { font-size:0.84rem; color:var(--ink-500); }
.badge { display:inline-block; padding:3px 9px; background:var(--forest-100); color:var(--forest-700); border-radius:99px; font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; white-space:nowrap; }
.badge.inactive { background:#e8e6e1; color:var(--ink-700); }
.badge.empty { background:#fdebe5; color:var(--clay-700); }
.retailer-row .btn-book { padding:8px 16px; border:1.5px solid rgba(15,44,23,0.15); border-radius:99px; font-size:0.84rem; font-weight:600; color:var(--forest-900); text-decoration:none; background:white; white-space:nowrap; }
.retailer-row .btn-book:hover { background:var(--cream-100); border-color:var(--forest-500); }

/* ===== Demos list ===== */
.demos-row { display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid rgba(15,44,23,0.06); }
.demos-row:last-child { border-bottom:0; }
.demos-date { min-width:64px; text-align:center; padding:6px 0; background:var(--forest-50); border-radius:8px; }
.demos-date .day { font-family:'Plus Jakarta Sans', sans-serif; font-size:1.5rem; color:var(--forest-900); line-height:1; font-weight:400; }
.demos-date .mon { font-size:0.7rem; text-transform:uppercase; color:var(--ink-500); letter-spacing:0.08em; font-weight:700; margin-top:2px; }
.demos-info { flex:1; min-width:0; }
.demos-retailer { font-weight:600; font-size:0.98rem; color:var(--forest-900); }
.demos-venue { font-size:0.86rem; color:var(--ink-500); margin-top:2px; }
.demos-product { font-size:0.85rem; color:var(--ink-700); margin-top:4px; font-style:italic; }
.demos-status { font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; padding:4px 10px; border-radius:99px; }
.demos-status.confirmed { background:var(--forest-100); color:var(--forest-700); }
.demos-status.pending { background:#fff3d6; color:#a16928; }
.demos-status.completed { background:#e8e6e1; color:var(--ink-700); }
.demos-status.cancelled { background:#fae5e0; color:var(--clay-700); }
.empty-state { padding:28px 0; text-align:center; color:var(--ink-500); font-size:0.92rem; }

/* ===== Calendar view ===== */
.cal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; gap:14px; }
.cal-head h3 { font-family:'Plus Jakarta Sans', sans-serif; font-size:1.6rem; font-weight:400; color:var(--forest-900); min-width:200px; }
.cal-nav { display:flex; gap:6px; }
.cal-nav button { width:36px; height:36px; border:1.5px solid rgba(15,44,23,0.12); background:white; border-radius:50%; cursor:pointer; font-size:1.1rem; color:var(--forest-900); display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.cal-nav button:hover { background:var(--cream-100); border-color:var(--forest-500); }
.cal-grid { display:grid; grid-template-columns:repeat(7, 1fr); gap:6px; }
@media (max-width:760px) {
  .cal-grid { gap:2px; }
  .cal-day { min-height:64px; padding:3px 4px; border-radius:5px; }
  .cal-day .day-num { font-size:0.7rem; margin-bottom:2px; }
  .cal-event { font-size:0.62rem !important; padding:2px 4px !important; line-height:1.15 !important; }
  .cal-head { gap:8px; flex-wrap:wrap; }
  .cal-head h2, .cal-head .month-label { font-size:1rem !important; }
}
@media (max-width:480px) {
  .cal-day { min-height:52px; padding:2px 3px; }
  .cal-day .day-num { font-size:0.64rem; }
  .cal-event { font-size:0.56rem !important; padding:1px 3px !important; }
}
.cal-dow { font-size:0.7rem; text-transform:uppercase; color:var(--ink-500); letter-spacing:0.08em; font-weight:700; text-align:center; padding:6px 0; }
.cal-day { min-height:96px; background:#fbf9f3; border:1px solid rgba(15,44,23,0.06); border-radius:8px; padding:6px 8px; position:relative; }
.cal-day.empty-day { background:transparent; border-color:transparent; }
.cal-day.today { border-color:var(--forest-500); }
.cal-day .day-num { font-size:0.8rem; font-weight:600; color:var(--ink-700); margin-bottom:4px; }
.cal-day.today .day-num { color:var(--forest-700); }
.cal-event { background:var(--forest-500); color:white; font-size:0.7rem; padding:3px 6px; border-radius:4px; margin-top:3px; line-height:1.25; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; }
.cal-event.pending { background:#a16928; }
.cal-event.completed { background:#6b6a64; }
.cal-event.cancelled, .cal-event.declined { background:var(--clay-700); }
.cal-legend { display:flex; gap:16px; flex-wrap:wrap; margin-top:18px; font-size:0.82rem; color:var(--ink-500); }
.cal-legend-item { display:flex; align-items:center; gap:6px; }
.cal-legend-dot { width:10px; height:10px; border-radius:3px; background:var(--forest-500); }
.cal-legend-dot.pending { background:#a16928; }
.cal-legend-dot.completed { background:#6b6a64; }
.cal-legend-dot.cancelled { background:var(--clay-700); }

/* ===== Profile editor ===== */
.tab-bar { display:flex; gap:6px; margin-bottom:14px; border-bottom:1px solid rgba(15,44,23,0.08); }
.tab-bar button { padding:10px 16px; background:transparent; border:none; border-bottom:2px solid transparent; font-family:inherit; font-size:0.9rem; font-weight:600; color:var(--ink-500); cursor:pointer; transition:all 0.15s; margin-bottom:-1px; }
.tab-bar button.active { color:var(--forest-900); border-bottom-color:var(--forest-500); }
.tab-pane { display:none; }
.tab-pane.active { display:block; }
.form-row { margin-bottom:14px; }
.form-row.split { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.label { display:block; font-size:0.78rem; font-weight:600; color:var(--forest-900); margin-bottom:5px; }
.input, .textarea { width:100%; padding:10px 12px; border:1.5px solid rgba(15,44,23,0.12); border-radius:8px; font-size:0.92rem; font-family:inherit; background:white; color:var(--ink-900); }
.input:focus, .textarea:focus { outline:none; border-color:var(--forest-500); }
.textarea { min-height:72px; resize:vertical; }
.btn { padding:11px 22px; background:var(--forest-900); color:white; border:none; border-radius:8px; font-size:0.92rem; font-weight:600; cursor:pointer; font-family:inherit; }
.btn:hover { background:var(--forest-700); }
.btn:disabled { opacity:0.6; cursor:not-allowed; }
.btn-ghost { background:transparent; color:var(--ink-700); border:1.5px solid rgba(15,44,23,0.12); }
.btn-ghost:hover { background:var(--cream-100); color:var(--forest-900); }
.btn-danger { background:transparent; color:var(--clay-700); border:1.5px solid var(--clay-700); }
.btn-danger:hover { background:#fdebe5; }
.saved { display:inline-block; margin-left:10px; color:var(--forest-500); font-size:0.85rem; font-weight:600; opacity:0; transition:opacity 0.3s; }
.saved.show { opacity:1; }
.help { font-size:0.78rem; color:var(--ink-500); margin-top:4px; }

/* ===== Category picker ===== */
.catpicker { position:relative; border:1.5px solid rgba(15,44,23,0.12); border-radius:8px; background:white; padding:5px 7px; display:flex; flex-wrap:wrap; align-items:center; gap:5px; min-height:40px; cursor:text; transition:border-color 0.15s; }
.catpicker:focus-within { border-color:var(--forest-500); }
.catpicker .pill { display:inline-flex; align-items:center; gap:5px; padding:3px 9px 3px 11px; background:var(--forest-900); color:white; border-radius:99px; font-size:0.78rem; font-weight:500; }
.catpicker .pill button { background:none; border:none; color:rgba(255,255,255,0.7); cursor:pointer; font-size:1rem; padding:0; line-height:1; display:flex; align-items:center; }
.catpicker .pill button:hover { color:white; }
.catpicker .search { flex:1; min-width:110px; border:none; outline:none; font-family:inherit; font-size:0.88rem; padding:5px 4px; background:transparent; color:var(--ink-900); }
.catpicker .dropdown { position:absolute; top:calc(100% + 5px); left:0; right:0; background:white; border:1.5px solid rgba(15,44,23,0.12); border-radius:8px; max-height:220px; overflow-y:auto; z-index:20; box-shadow:0 8px 24px rgba(15,44,23,0.08); display:none; }
.catpicker .dropdown.open { display:block; }
.catpicker .dropdown .opt { padding:9px 13px; font-size:0.88rem; color:var(--ink-900); cursor:pointer; }
.catpicker .dropdown .opt:hover, .catpicker .dropdown .opt.active { background:var(--cream-100); }
.catpicker .dropdown .empty { padding:13px; color:var(--ink-500); font-size:0.85rem; text-align:center; }

/* ===== COI file upload ===== */
.coi-block { padding:14px 16px; background:#f9f7f2; border:1px solid rgba(15,44,23,0.08); border-radius:10px; }
.coi-empty { padding:22px; text-align:center; border:1.5px dashed rgba(15,44,23,0.18); border-radius:10px; background:white; transition:all 0.15s; cursor:pointer; }
.coi-empty:hover { border-color:var(--forest-500); background:var(--forest-50); }
.coi-empty .icon { width:36px; height:36px; margin:0 auto 10px; opacity:0.6; }
.coi-empty .lbl { font-weight:600; font-size:0.95rem; color:var(--forest-900); margin-bottom:4px; }
.coi-empty .sub { font-size:0.82rem; color:var(--ink-500); }
.coi-filled { display:flex; align-items:center; gap:12px; }
.coi-filled .icon { width:36px; height:44px; flex-shrink:0; background:white; border:1px solid rgba(15,44,23,0.1); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:700; color:var(--clay-700); }
.coi-filled .info { flex:1; min-width:0; }
.coi-filled .name { font-weight:600; font-size:0.94rem; color:var(--forest-900); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.coi-filled .meta { font-size:0.82rem; color:var(--ink-500); margin-top:2px; }
.coi-filled .actions { display:flex; gap:6px; flex-shrink:0; }
.coi-filled .actions a, .coi-filled .actions button { padding:6px 12px; font-size:0.82rem; border-radius:99px; font-weight:600; text-decoration:none; cursor:pointer; font-family:inherit; }
.coi-filled .actions .view { background:white; border:1.5px solid rgba(15,44,23,0.12); color:var(--forest-900); }
.coi-filled .actions .view:hover { background:var(--cream-100); }
.coi-filled .actions .replace { background:var(--forest-900); color:white; border:none; }
.coi-filled .actions .replace:hover { background:var(--forest-700); }
.coi-filled .actions .remove { background:transparent; border:1.5px solid rgba(15,44,23,0.12); color:var(--clay-700); }
.coi-filled .actions .remove:hover { background:#fdebe5; }
.coi-uploading { display:flex; align-items:center; gap:10px; padding:14px; }
.coi-uploading .spinner-sm { width:18px; height:18px; border:2.5px solid var(--forest-100); border-top-color:var(--forest-500); border-radius:50%; animation:spin 0.7s linear infinite; }

/* ===== Avatar upload ===== */
.avatar-block { display:flex; align-items:center; gap:18px; padding-bottom:22px; margin-bottom:22px; border-bottom:1px solid rgba(15,44,23,0.06); }
.avatar-lg { width:80px; height:80px; border-radius:50%; background:var(--cream-100); overflow:hidden; display:flex; align-items:center; justify-content:center; border:2px solid rgba(15,44,23,0.08); flex-shrink:0; }
.avatar-lg img { width:100%; height:100%; object-fit:cover; }
.avatar-lg svg { width:80px; height:80px; display:block; }
.avatar-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.avatar-actions .btn { padding:8px 16px; font-size:0.85rem; }

/* ===== Welcome banner ===== */
.welcome { background:var(--forest-50); border:1px solid rgba(15,44,23,0.12); border-radius:14px; padding:24px 28px; margin-bottom:28px; position:relative; }
.welcome .dismiss { position:absolute; top:14px; right:16px; background:none; border:none; font-size:1.4rem; color:var(--ink-500); cursor:pointer; line-height:1; }
.welcome .eyebrow { font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.14em; color:var(--clay-700); margin-bottom:10px; }
.welcome h3 { font-family:'Plus Jakarta Sans', sans-serif; font-size:1.5rem; font-weight:400; color:var(--forest-900); margin-bottom:12px; line-height:1.2; }
.welcome ol { font-size:0.98rem; color:var(--ink-700); line-height:1.6; margin:0 0 14px 18px; padding:0; }
.welcome ol li { margin-bottom:6px; }
.welcome p { font-size:0.88rem; color:var(--ink-500); margin:0; }
.welcome a { color:var(--forest-700); font-weight:600; }

/* ===== Team list ===== */
.team-row { display:flex; align-items:center; gap:12px; padding:12px 14px; background:#f9f7f2; border-radius:8px; margin-bottom:8px; }
.team-row .info { flex:1; min-width:0; }
.team-row .tm-name { font-weight:600; color:var(--forest-900); font-size:0.94rem; }
.team-row .tm-name .you { color:var(--ink-500); font-weight:400; font-size:0.78rem; margin-left:4px; }
.team-row .tm-email { color:var(--ink-500); font-size:0.82rem; margin-top:2px; }
.team-row .tm-actions { display:flex; gap:6px; align-items:center; flex-shrink:0; }

function closeBrandMobileNav() {
  document.getElementById('brandNavDrawer').classList.remove('open');
  document.getElementById('brandNavBackdrop').classList.remove('open');
}
function toggleBrandMobileNav() {
  var d = document.getElementById('brandNavDrawer');
  if (d.classList.contains('open')) closeBrandMobileNav(); else openBrandMobileNav();
}
function brandMobileNavGo(e, tab) {
  e.preventDefault();
  closeBrandMobileNav();
  // Trigger the same tab activation the desktop nav uses
  document.querySelectorAll('.nav-mobile-drawer a').forEach(function(a) {
    if (a.dataset.mobileTab === tab) a.classList.add('active'); else a.classList.remove('active');
  });
  var desktopTab = document.querySelector('.nav-tab[data-tab="' + tab + '"]');
  if (desktopTab) desktopTab.click();
  else { location.hash = '#' + tab; }
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeBrandMobileNav();
});

const SESSION_KEY = 'demohub_brand_account_session';
const sessionToken = localStorage.getItem(SESSION_KEY);
const main = document.getElementById('mainContent');
const navAvatar = document.getElementById('navAvatar');
const navName = document.getElementById('navName');

if (!sessionToken) window.location.href = '/brand/signin';

function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(iso, fmt) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  if (fmt === 'long') return d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  return { day: d.getDate(), mon: d.toLocaleDateString('en-US', { month: 'short' }) };
}

// Default avatar SVG
const DEFAULT_AVATAR_SVG = `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="32" fill="#d3cfc4"/><circle cx="32" cy="24" r="10" fill="#a8a298"/><path d="M14 56 C14 44, 24 38, 32 38 C40 38, 50 44, 50 56 Z" fill="#a8a298"/></svg>`;
function renderAvatar(el, url, size) {
  if (url) el.innerHTML = `<img src="${escapeHtml(url)}" alt="">`;
  else el.innerHTML = DEFAULT_AVATAR_SVG;
}

// Confirm modal helper
function confirmDialog(title, body, confirmLabel) {
  return new Promise(resolve => {
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmBody').textContent = body;
    document.getElementById('confirmOk').textContent = confirmLabel || 'Confirm';
    const modal = document.getElementById('confirmModal');
    modal.classList.add('open');
    const cleanup = (v) => { modal.classList.remove('open'); resolve(v); };
    document.getElementById('confirmCancel').onclick = () => cleanup(false);
    document.getElementById('confirmOk').onclick = () => cleanup(true);
  });
}

function initCatPicker({ pickerEl, searchEl, dropdownEl, hiddenEl, options, initial = [] }) {
  const selected = new Set(initial);
  let activeIdx = 0;
  function syncHidden() { hiddenEl.value = Array.from(selected).join(', '); }
  function renderPills() {
    pickerEl.querySelectorAll('.pill').forEach(p => p.remove());
    Array.from(selected).reverse().forEach(cat => {
      const pill = document.createElement('span');
      pill.className = 'pill';
      pill.innerHTML = `<span>${cat}</span><button type="button" aria-label="Remove">&times;</button>`;
      pill.querySelector('button').addEventListener('click', (e) => { e.stopPropagation(); selected.delete(cat); renderPills(); renderDropdown(); syncHidden(); });
      pickerEl.insertBefore(pill, searchEl);
    });
  }
  function renderDropdown() {
    const q = searchEl.value.trim().toLowerCase();
    const available = options.filter(o => !selected.has(o));
    const matches = available.filter(o => !q || o.toLowerCase().includes(q));
    if (matches.length === 0) { dropdownEl.innerHTML = `<div class="empty">${available.length === 0 ? 'All categories picked.' : 'No matches.'}</div>`; return; }
    activeIdx = Math.min(activeIdx, matches.length - 1);
    if (activeIdx < 0) activeIdx = 0;
    dropdownEl.innerHTML = matches.map((m, i) => `<div class="opt${i === activeIdx ? ' active' : ''}" data-cat="${m}">${m}</div>`).join('');
    dropdownEl.querySelectorAll('.opt').forEach(opt => {
      opt.addEventListener('mousedown', (e) => e.preventDefault());
      opt.addEventListener('click', () => {
        selected.add(opt.dataset.cat); searchEl.value = ''; activeIdx = 0;
        renderPills(); renderDropdown(); syncHidden(); searchEl.focus();
      });
    });
  }
  function open() { dropdownEl.classList.add('open'); renderDropdown(); }
  function close() { dropdownEl.classList.remove('open'); }
  pickerEl.addEventListener('click', () => searchEl.focus());
  searchEl.addEventListener('focus', open);
  searchEl.addEventListener('input', () => { activeIdx = 0; renderDropdown(); if (!dropdownEl.classList.contains('open')) open(); });
  searchEl.addEventListener('keydown', (e) => {
    const opts = Array.from(dropdownEl.querySelectorAll('.opt'));
    if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx + 1, opts.length - 1); renderDropdown(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx - 1, 0); renderDropdown(); }
    else if (e.key === 'Enter') { e.preventDefault(); if (opts[activeIdx]) opts[activeIdx].click(); }
    else if (e.key === 'Escape') { close(); searchEl.blur(); }
    else if (e.key === 'Backspace' && !searchEl.value && selected.size > 0) {
      const last = Array.from(selected).pop(); selected.delete(last); renderPills(); renderDropdown(); syncHidden();
    }
  });
  document.addEventListener('click', (e) => { if (!pickerEl.contains(e.target)) close(); });
  renderPills(); syncHidden();
}

const CATEGORY_OPTIONS = ['Beverages','Coffee & tea','Wine, beer & spirits','Snacks & chips','Chocolate & candy','Bakery & bread','Cereal & breakfast','Pantry & dry goods','Sauces, oils & condiments','Spices & seasonings','Dairy & cheese','Plant-based & vegan','Frozen','Produce','Meat & seafood','Prepared foods & deli','Health, supplements & wellness','Protein, bars & energy','Personal care & beauty','Pet supplies','Home & household','Baby & kids','CBD & hemp','Other'];

// ===== State =====
let _data = null; // { profile, demos, contacts }
let _currentTab = 'overview';
let _calMonth = new Date().getMonth();
let _calYear = new Date().getFullYear();

// ===== Load data =====
async function loadData() {
  try {
    const r = await fetch('/api/brand-account?action=data&session_id=' + encodeURIComponent(sessionToken));
    if (r.status === 401) { localStorage.removeItem(SESSION_KEY); window.location.href = '/brand/signin'; return; }
    _data = await r.json();
  } catch (e) {
    main.innerHTML = `<div class="empty">Couldn't load your portal. <a href="/brand/signin">Sign in again</a>.</div>`;
    throw e;
  }
  const profile = _data.profile || {};
  navName.textContent = profile.company_name || profile.email || '';
  // Add inline verified mark next to brand name in nav if verified
  const navVerifyMark = document.getElementById('navVerifyMark');
  const _coiOk = !!profile.default_coi_url && (!profile.default_coi_expires || new Date(profile.default_coi_expires + 'T00:00:00') > new Date());
  const _profOk = !!(profile.company_name && profile.contact_name && profile.email);
  if (navVerifyMark) navVerifyMark.style.display = (_coiOk && _profOk) ? 'inline-flex' : 'none';
  renderAvatar(navAvatar, profile.logo_url);
  // Re-append the upload overlay after renderAvatar sets innerHTML
  if (navAvatar && !navAvatar.querySelector('.avatar-upload-overlay')) {
    navAvatar.insertAdjacentHTML('beforeend', `<div class="avatar-upload-overlay"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>`);
  }
}

// ===== Tab Router =====
function switchTab(name) {
  if (!['overview','calendar','profile','team','agreements','account'].includes(name)) name = 'overview';
  _currentTab = name;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  render();
  if (window.location.hash !== '#' + name) history.replaceState(null, '', '#' + name);
}
window.addEventListener('hashchange', () => switchTab(window.location.hash.replace(/^#/, '') || 'overview'));
document.querySelectorAll('.nav-tab').forEach(t => t.addEventListener('click', (e) => { e.preventDefault(); switchTab(t.dataset.tab); }));

// ===== Render dispatch =====
function render() {
  if (_currentTab === 'overview') renderOverview();
  else if (_currentTab === 'calendar') renderCalendar();
  else if (_currentTab === 'profile') renderProfile();
  else if (_currentTab === 'team') renderTeam();
  else if (_currentTab === 'agreements') renderAgreements();
  else if (_currentTab === 'account') renderAccount();
  if (typeof updatePersistentCoiNudge === 'function') updatePersistentCoiNudge();
}

// ===== Overview =====
// Wave 8: persistent COI nudge — shown on every tab when COI is missing or expired.
// Brands legally can't book demos without a current COI; the more visible the nudge, the better.
function updatePersistentCoiNudge() {
  const banner = document.getElementById('persistentCoiNudge');
  if (!banner) return;
  const profile = _data && _data.profile;
  if (!profile) { banner.style.display = 'none'; return; }
  const hasCoi = !!profile.default_coi_url;
  const exp = profile.default_coi_expires ? new Date(profile.default_coi_expires + 'T00:00:00') : null;
  const expired = exp && exp <= new Date();
  if (hasCoi && !expired) { banner.style.display = 'none'; return; }
  const label = !hasCoi ? 'No Certificate of Insurance on file.' : 'Your COI is expired.';
  banner.innerHTML = `<div style="display:flex; align-items:center; gap:14px; padding:10px 18px; background:#fff3ed; border-bottom:1px solid #ed682f33;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a14e2a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="13"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <div style="flex:1; font-size:0.88rem; line-height:1.45; color:#a14e2a;"><strong>${label}</strong> Retailers require a current COI before accepting your bookings. <a href="#profile" onclick="setTimeout(updatePersistentCoiNudge,300)" style="color:#a14e2a; font-weight:700; text-decoration:underline;">Upload now &rarr;</a></div>
  </div>`;
  banner.style.display = 'block';
}

function renderOverview() {
  const profile = _data.profile || {};
  const demos = (_data.demos || []).slice().sort((a, b) => (b.demo_date || '').localeCompare(a.demo_date || ''));
  const contacts = _data.contacts || [];

  const today = new Date().toISOString().slice(0,10);
  const upcoming = demos.filter(d => d.demo_date >= today && (d.status === 'confirmed' || d.status === 'pending')).length;
  const completed = demos.filter(d => d.status === 'completed').length;
  const retailerSet = new Set(demos.map(d => d.retailer_id).filter(Boolean));
  contacts.forEach(c => c.retailer_id && retailerSet.add(c.retailer_id));
  const totalRetailers = retailerSet.size;

  // Perf
  const monthBuckets = {};
  const now = new Date(); const monthKeys = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    monthBuckets[key] = { count: 0, label: d.toLocaleDateString('en-US', { month: 'short' }) };
    monthKeys.push(key);
  }
  demos.forEach(d => { if (!d.demo_date) return; const k = d.demo_date.slice(0,7); if (monthBuckets[k]) monthBuckets[k].count++; });
  const maxMonthCount = Math.max(1, ...monthKeys.map(k => monthBuckets[k].count));
  const totalInvested = demos.filter(d => d.status === 'completed' || d.status === 'confirmed').reduce((s,d) => s + (parseFloat(d.demo_fee) || 0), 0);
  const finishedCount = demos.filter(d => ['completed','cancelled','declined'].includes(d.status)).length;
  const completionRate = finishedCount > 0 ? Math.round((completed / finishedCount) * 100) : null;

  // Your retailers
  const retailerMap = {};
  demos.forEach(d => {
    const rid = d.retailer_id; if (!rid) return;
    if (!retailerMap[rid]) retailerMap[rid] = { id: rid, name: d.retailers?.name || 'Unknown', slug: d.retailers?.slug || '', demoCount: 0, lastDemoDate: null };
    retailerMap[rid].demoCount++;
    if (!retailerMap[rid].lastDemoDate || d.demo_date > retailerMap[rid].lastDemoDate) retailerMap[rid].lastDemoDate = d.demo_date;
  });
  contacts.forEach(c => { const rid = c.retailer_id; if (!rid || retailerMap[rid]) return; retailerMap[rid] = { id: rid, name: c.retailers?.name || 'Unknown', slug: c.retailers?.slug || '', demoCount: 0, lastDemoDate: null }; });
  const yourRetailers = Object.values(retailerMap).sort((a, b) => {
    if (a.lastDemoDate && b.lastDemoDate) return b.lastDemoDate.localeCompare(a.lastDemoDate);
    if (a.lastDemoDate) return -1;
    if (b.lastDemoDate) return 1;
    return b.demoCount - a.demoCount || a.name.localeCompare(b.name);
  });

  // Welcome banner
  const welcomeDismissedKey = 'demohub_brand_welcome_dismissed_' + (profile.id || 'none');
  const showWelcome = demos.length === 0 && !localStorage.getItem(welcomeDismissedKey);
  const needsCoi = !profile.default_coi_url;
  const welcomeHtml = showWelcome ? `
    <div class="welcome" id="welcomeBanner">
      <button class="dismiss" onclick="dismissWelcome('${welcomeDismissedKey}')">&times;</button>
      <div class="eyebrow">Welcome to Demohub</div>
      <h3>Three quick things to finish setting up.</h3>
      <ol>
        <li><strong>${needsCoi ? 'Upload your COI' : 'Round out your profile'}</strong>, ${needsCoi ? 'Add your certificate of insurance so it auto-attaches to every demo booking.' : 'Fill in your phone, website, and product details so retailer forms pre-fill at every booking.'} <a href="#profile">Edit your profile →</a></li>
        <li><strong>Share your Demohub link</strong> with retailers you work with, they can book demos with you faster if they're on Demohub.</li>
        <li><strong>Invite your team</strong>, add up to 5 teammates so anyone at your brand can manage demos, COI, and bookings. <a href="#team">Manage team →</a></li>
      </ol>
      <p>Once you book your first demo at any Demohub retailer, it shows up here automatically.</p>
    </div>` : '';

  const hasDemos = demos.length > 0;
  const perfHtml = hasDemos ? `
    <div class="card">
      <h2>Performance</h2>
      <div class="sub">Your activity across every Demohub retailer.</div>
      <div class="perf-stats">
        <div class="perf-stat"><div class="val">$${Math.round(totalInvested).toLocaleString()}</div><div class="lbl">Demo fees paid</div></div>
        <div class="perf-stat"><div class="val">${completionRate == null ? ', ' : completionRate + '%'}</div><div class="lbl">Completion rate</div></div>
        <div class="perf-stat"><div class="val">${(demos.length / 6).toFixed(1)}</div><div class="lbl">Avg per month</div></div>
      </div>
      <div style="font-size:0.78rem; color:var(--ink-500); text-transform:uppercase; letter-spacing:0.06em; font-weight:600; margin-bottom:14px;">Demos per month, last 6 months</div>
      <div class="perf-chart">
        ${monthKeys.map(k => { const b = monthBuckets[k]; const heightPct = (b.count / maxMonthCount) * 100; return `<div class="bar-col"><div class="bar" style="height:${heightPct}%;">${b.count > 0 ? `<div class="bar-val">${b.count}</div>` : ''}</div><div class="bar-lbl">${b.label}</div></div>`; }).join('')}
      </div>
    </div>` : '';

  const retailersHtml = yourRetailers.length === 0 ? '' : `
    <div class="card">
      <h2>Your retailers</h2>
      <div class="sub">Every Demohub retailer you have a relationship with.</div>
      ${yourRetailers.map(r => {
        const lastDate = r.lastDemoDate ? new Date(r.lastDemoDate + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : null;
        const isActive = r.lastDemoDate && (Date.now() - new Date(r.lastDemoDate + 'T00:00:00').getTime()) < 1000 * 60 * 60 * 24 * 180;
        const badge = r.demoCount === 0 ? '<span class="badge empty">No demos yet</span>' : (isActive ? '<span class="badge">Active</span>' : '<span class="badge inactive">Dormant</span>');
        return `<div class="retailer-row">
          <div class="retailer-info">

        </div>`;
      }).join('')}
    </div>`;

  // ===== Activity feed: derived client-side from existing demos =====
  // Last 30 days. Events: booked / confirmed / completed / declined. Max 8 items.
  const activityHtml = (() => {
    const thirtyAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000);
    const events = [];
    demos.forEach(d => {
      const retailerName = d.retailers?.name || 'a retailer';

    });
    const recent = events.filter(e => e.at && e.at >= thirtyAgo).sort((a, b) => b.at - a.at).slice(0, 8);
    if (recent.length === 0) return '';
    const dotColor = (k) => k === 'confirmed' ? '#3a7142' : k === 'completed' ? '#6b6a64' : k === 'declined' ? '#a14e2a' : '#ed682f';
    return `

        <div class="activity-list">
          ${recent.map(e => `
            <div class="activity-item">
              <span class="activity-dot" style="background:${dotColor(e.kind)};"></span>
              <div class="activity-content">
                <div class="activity-text">${escapeHtml(e.text)}</div>
                <div class="activity-when">${e.at.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })}</div>
              </div>
            </div>
          `).join('')}
        </div>
        <div style="margin-top:14px; padding-top:14px; border-top:1px solid rgba(15,44,23,0.06);">
          <a href="#calendar" style="font-size:0.86rem; color:var(--forest-700); font-weight:600; text-decoration:none;">View full timeline →</a>
        </div>
      </div>`;
  })();

  const demosListHtml = `
    <div class="card">

      <div class="sub">Confirmed and pending across all retailers you've booked with.</div>

          : `Your COI expires in <strong>${daysLeft} day${daysLeft === 1 ? '' : 's'}</strong>, replace it before then so retailer bookings aren't held up.`;
      coiWarnHtml = `<div class="coi-warn">
        <div class="icon">!</div>
        <div class="msg">${msg}</div>

      <div class="vmsg"><strong>You're verified</strong><p>Retailers see this badge next to your brand across Demohub.${!hasLogo ? ' <strong><a href="#profile" style="color:var(--forest-700);">Add a profile picture</a></strong> to look even more credible.' : ''}</p></div>
    </div>`;
  } else {
    const missing = [];
    if (!profile.default_coi_url) missing.push('Upload a current Certificate of Insurance');
    else if (profile.default_coi_expires && new Date(profile.default_coi_expires + 'T00:00:00') <= new Date()) missing.push('Replace your expired COI');
    if (!nameOk) missing.push('Add your brand / company name');
    if (!pocOk) missing.push('Add a dedicated point of contact');
    if (!emailOk) missing.push('Add a contact email');
    if (!websiteOk) missing.push('Add your business website (verifies your identity)');
    verifiedPanelHtml = `<div class="verified-panel pending">
      <svg width="28" height="28" viewBox="0 0 24 24" class="vbadge muted"><circle cx="12" cy="12" r="11" fill="#d3d1c7"/><path d="M7.5 12.5l2.8 2.8 6-6.4" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      <div class="vmsg"><strong>Almost verified</strong><p style="margin:6px 0 0;font-size:0.86rem;color:var(--ink-500);">The verified badge shows on your profile in every retailer's booking page once these are done. It's the trust signal that gets your demos accepted faster.</p><p style="margin:14px 0 6px;font-size:0.85rem;color:var(--ink-700);font-weight:600;">Still to do:</p><ul>${missing.map(m => '<li>' + escapeHtml(m) + '</li>').join('')}</ul>${!hasLogo ? '<p style="margin-top:10px;font-size:0.85rem;color:var(--ink-500);"><em>Recommended:</em> <a href="#profile" style="color:var(--forest-700);font-weight:600;">Add a profile picture</a> so retailers recognize your brand at a glance.</p>' : ''}</div>
    </div>`;
  }

  main.innerHTML = `
    <div class="page-head"><div>
      <h1>Welcome back${profile.contact_name ? ', ' + escapeHtml(profile.contact_name.split(' ')[0]) : ''}.</h1>

    </div></div>
    ${welcomeHtml}

    <div class="stat-row">
      <div class="stat" title="Demos you have confirmed but not yet completed. Includes confirmed bookings from today onward."><div class="stat-num">${upcoming}</div><div class="stat-lbl">Upcoming demos</div></div>

    </div>
    ${perfHtml}

    ${demosListHtml}
  `;
}

        <div style="background:white; border:1px solid rgba(15,44,23,0.08); border-radius:18px; padding:48px 32px; text-align:center; max-width:560px; margin:40px auto;">
          <div style="width:64px; height:64px; margin:0 auto 18px; background:var(--cream-100); border-radius:50%; display:flex; align-items:center; justify-content:center;">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--forest-700)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </div>
          <h2 style="margin:0 0 8px; font-size:1.35rem; color:var(--forest-900); letter-spacing:-0.02em;">No demos on your calendar yet</h2>
          <p style="font-size:0.95rem; line-height:1.55; color:var(--ink-500); margin:0 0 22px;">When you book a demo at a Demohub retailer, it shows up here automatically. Each retailer shares a booking link with their brand partners.</p>
          <a href="#overview" style="display:inline-block; background:var(--forest-900); color:white; padding:11px 22px; border-radius:10px; text-decoration:none; font-weight:700; font-size:0.92rem;">See your retailers</a>
        </div>
      `;
    }
    return;
  }
  const monthName = new Date(_calYear, _calMonth, 1).toLocaleDateString('en-US', { month:'long', year:'numeric' });
  const firstDow = new Date(_calYear, _calMonth, 1).getDay();
  const daysInMonth = new Date(_calYear, _calMonth + 1, 0).getDate();
  const todayStr = new Date().toISOString().slice(0,10);

  // Group demos by date
  const byDate = {};
  demos.forEach(d => {
    if (!d.demo_date) return;
    const [y, m] = d.demo_date.split('-').map(n => parseInt(n, 10));
    if (y !== _calYear || m !== _calMonth + 1) return;
    if (!byDate[d.demo_date]) byDate[d.demo_date] = [];
    byDate[d.demo_date].push(d);
  });

  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push('<div class="cal-day empty-day"></div>');
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${_calYear}-${String(_calMonth + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const todays = byDate[dateStr] || [];
    const isToday = dateStr === todayStr;
    const eventsHtml = todays.map(d => `<div class="cal-event ${d.status}" title="${escapeHtml((d.retailers?.name || '') + ' · ' + (d.demo_time || ''))}" onclick="openDemoDetail('${escapeHtml(d.id)}')">${escapeHtml(d.retailers?.name || 'Demo')}</div>`).join('');
    cells.push(`<div class="cal-day${isToday ? ' today' : ''}"><div class="day-num">${day}</div>${eventsHtml}</div>`);
  }

  main.innerHTML = `
    <div class="page-head"><div>
      <h1>Calendar</h1>
      <div class="sub">Every demo on the calendar across every retailer.</div>
    </div></div>
    <div class="card">
      <div class="cal-head">
        <h3>${monthName}</h3>
        <div class="cal-nav">
          <button onclick="navMonth(-1)" aria-label="Previous month">‹</button>
          <button onclick="navMonth(0)" aria-label="Today">·</button>
          <button onclick="navMonth(1)" aria-label="Next month">›</button>
        </div>
      </div>
      <div class="cal-grid">
        ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="cal-dow">${d}</div>`).join('')}
        ${cells.join('')}
      </div>
      <div class="cal-legend">
        <div class="cal-legend-item"><span class="cal-legend-dot"></span>Confirmed</div>
        <div class="cal-legend-item"><span class="cal-legend-dot pending"></span>Pending</div>
        <div class="cal-legend-item"><span class="cal-legend-dot completed"></span>Completed</div>
        <div class="cal-legend-item"><span class="cal-legend-dot cancelled"></span>Cancelled / Declined</div>
      </div>
    </div>
  `;
}

window.navMonth = function(delta) {
  if (delta === 0) { const n = new Date(); _calMonth = n.getMonth(); _calYear = n.getFullYear(); }
  else {
    _calMonth += delta;
    if (_calMonth > 11) { _calMonth = 0; _calYear++; }
    if (_calMonth < 0) { _calMonth = 11; _calYear--; }
  }
  renderCalendar();
};

      } catch (err) {

        renderCoiWidget();
      }
    };
    reader.readAsDataURL(file);
  });
}

// ===== Brand portal write actions (save profile, remove COI/avatar, sign out, team) =====
async function _brandApi(action, payload, method) {
  const m = (method || 'POST').toUpperCase();
  const url = '/api/brand-account?action=' + encodeURIComponent(action) + '&session_id=' + encodeURIComponent(sessionToken);
  const opts = { method: m, headers: {'Content-Type':'application/json'} };
  if (payload !== undefined && m !== 'GET') opts.body = JSON.stringify(payload || {});
  const r = await fetch(url, opts);
  let j = null; try { j = await r.json(); } catch(_) {}
  if (!r.ok) throw new Error((j && j.error) || ('HTTP ' + r.status));
  return j || {};
}

// Save profile (wired to saveProfileBtn click)
async function saveProfile() {
  const btn = document.getElementById('saveProfileBtn');
  const saved = document.getElementById('profileSaved');
  if (!btn) return;
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const payload = {
      company_name: document.getElementById('f_company_name')?.value.trim() || '',
      contact_name: document.getElementById('f_contact_name')?.value.trim() || '',
      phone: document.getElementById('f_phone')?.value.trim() || '',
      website: document.getElementById('f_website')?.value.trim() || '',
      default_coi_expires: document.getElementById('f_default_coi_expires')?.value || null,
      default_product_info: document.getElementById('f_default_product_info')?.value.trim() || '',
      default_categories: document.getElementById('f_default_categories')?.value || '',
      needs_electricity: !!document.getElementById('f_needs_electricity')?.checked,
    };
    await _brandApi('profile-update', payload);
    Object.assign(_data.profile, payload);
    if (saved) { saved.classList.add('show'); setTimeout(() => saved.classList.remove('show'), 2500); }
    renderCoiWidget && renderCoiWidget();
  } catch (err) {
    alert('Save failed: ' + (err.message || 'unknown'));
  } finally {
    btn.disabled = false; btn.textContent = 'Save changes';
  }
}

window.inviteTeammate = async function() {

// ===== Brand Portal Onboarding Tour =====
const TOUR_STEPS = [
  { selector: '#welcomeBanner', title: "Welcome to Demohub.", body: "This is your brand portal. Manage your profile, COI, and demos at every retailer from one place.", placement: 'bottom', skipIfHidden: true },
  { selector: '.verified-panel', title: "Your verified badge.", body: "Retailers see this badge next to your brand. Upload a current COI, fill in your contact info, and add your website to earn it.", placement: 'bottom' },
  { selector: 'a[data-tab="profile"]', title: "Your brand profile.", body: "Click here anytime to update your company info, logo, COI, and product details. Filled out once, shared with every Demohub retailer.", placement: 'bottom' },
  { selector: 'a[data-tab="team"]', title: "Invite your team.", body: "Up to 5 teammates can manage your brand together — share COI uploads, demo bookings, profile updates. Owner / Member roles.", placement: 'bottom' },
  { selector: 'a[data-tab="calendar"]', title: "Your demo calendar.", body: "All your confirmed demos across every retailer, in one calendar. Use the Calendar tab to navigate by month.", placement: 'bottom' },
];
const BRAND_TOUR_KEY = 'demohub_brand_tour_complete';
let _tourIndex = 0;
let _activeTourSteps = [];
function startTour(force) {
  if (!force && localStorage.getItem(BRAND_TOUR_KEY) === '1') return;
  const welcome = document.getElementById('welcomeBanner');
  if (welcome && (welcome.style.display === 'none' || !welcome.classList.contains('active'))) {
    welcome.style.display = 'block';
    welcome.dataset.forcedForTour = '1';
  }
  _activeTourSteps = TOUR_STEPS.filter(s => {
    const el = document.querySelector(s.selector);
    return el && el.offsetParent !== null;
  });
  if (_activeTourSteps.length === 0) return;
  _tourIndex = 0;
  showTourStep();
}
function showTourStep() {
  const isFirstRun = localStorage.getItem(BRAND_TOUR_KEY) !== '1';
  document.querySelectorAll('.tour-skip').forEach(b => b.style.display = isFirstRun ? 'none' : '');

  const step = _activeTourSteps[_tourIndex];
  if (!step) { closeTour(); return; }
  const el = document.querySelector(step.selector);
  if (!el) { _tourIndex++; return showTourStep(); }

  const spotlight = document.getElementById('tourSpotlight');
  const tooltip = document.getElementById('tourTooltip');
  const backdrop = document.getElementById('tourBackdrop');
  if (!spotlight || !tooltip || !backdrop) return;
  backdrop.classList.add('active');

  function stickyOffset() {
    const nav = document.querySelector('.nav');
    if (nav) {
      const cs = window.getComputedStyle(nav);
      if (cs.position === 'sticky' || cs.position === 'fixed') {
        return nav.getBoundingClientRect().height || 0;
      }
    }
    return 0;
  }
  function isSticky(node) {
    while (node && node !== document.body) {
      const p = window.getComputedStyle(node).position;
      if (p === 'sticky' || p === 'fixed') return true;
      node = node.parentElement;
    }
    return false;
  }
  function scrollIntoUsefulView(cb) {
    if (isSticky(el)) { cb(); return; }
    const rect = el.getBoundingClientRect();
    const vh = window.innerHeight;
    const tallTarget = rect.height > vh * 0.6;
    try {
      el.scrollIntoView({ behavior: 'auto', block: tallTarget ? 'start' : 'center', inline: 'nearest' });
    } catch (_) {
      let p = el.parentElement;
      while (p && p !== document.body) {
        const cs = window.getComputedStyle(p);
        if ((cs.overflowY === 'auto' || cs.overflowY === 'scroll') && p.scrollHeight > p.clientHeight) {
          const elTop = el.getBoundingClientRect().top - p.getBoundingClientRect().top + p.scrollTop;
          p.scrollTop = tallTarget ? elTop - 16 : elTop - (p.clientHeight - rect.height) / 2;
          break;
        }
        p = p.parentElement;
      }
    }
    const navH = stickyOffset();
    if (tallTarget && navH > 0) {
      let p = el.parentElement;
      while (p && p !== document.body) {
        const cs = window.getComputedStyle(p);
        if ((cs.overflowY === 'auto' || cs.overflowY === 'scroll') && p.scrollHeight > p.clientHeight) {
          p.scrollTop -= navH;
          break;
        }
        p = p.parentElement;
      }
      // Also nudge window if window is the scroll container
      if (window.scrollY > 0) window.scrollBy(0, -navH);
    }
    requestAnimationFrame(() => requestAnimationFrame(cb));
  }

  function positionEverything() {
    const r = el.getBoundingClientRect();
    const spotPad = 10;
    spotlight.style.display = 'block';
    spotlight.style.top  = (r.top - spotPad) + 'px';
    spotlight.style.left = (r.left - spotPad) + 'px';
    spotlight.style.width  = (r.width + spotPad*2) + 'px';
    spotlight.style.height = (r.height + spotPad*2) + 'px';

    tooltip.style.display = 'block';
    document.getElementById('tourTitle').textContent = step.title;
    document.getElementById('tourBody').textContent = step.body;
    document.getElementById('tourStepLabel').textContent = `Step ${_tourIndex+1} of ${_activeTourSteps.length}`;
    document.getElementById('tourProgress').textContent = `${_tourIndex+1} / ${_activeTourSteps.length}`;
    document.getElementById('tourBackBtn').style.display = _tourIndex === 0 ? 'none' : 'inline-block';
    document.getElementById('tourNextBtn').textContent = _tourIndex === _activeTourSteps.length - 1 ? 'Got it' : 'Next →';

    tooltip.style.left = '-9999px';
    tooltip.style.top  = '-9999px';
    tooltip.classList.add('active');
    const tipRect = tooltip.getBoundingClientRect();

    const vh = window.innerHeight;
    const vw = window.innerWidth;
    const gap = 12;
    const navH = stickyOffset();
    const margin = 16;

    const spaceBelow = vh - (r.bottom + spotPad);
    const spaceAbove = (r.top - spotPad) - navH;
    let placement = step.placement || 'bottom';
    const needs = tipRect.height + gap;
    if (placement === 'bottom' && spaceBelow < needs && spaceAbove >= needs) placement = 'top';
    else if (placement === 'top' && spaceAbove < needs && spaceBelow >= needs) placement = 'bottom';
    if ((placement === 'bottom' && spaceBelow < needs) || (placement === 'top' && spaceAbove < needs)) {
      placement = spaceBelow >= spaceAbove ? 'bottom' : 'top';
    }
    let top, left;
    if (placement === 'top') top = (r.top - spotPad) - tipRect.height - gap;
    else top = (r.bottom + spotPad) + gap;
    left = r.left + (r.width/2) - (tipRect.width/2);
    left = Math.max(margin, Math.min(left, vw - tipRect.width - margin));
    const minTop = navH + margin;
    const maxTop = vh - tipRect.height - margin;
    top = Math.max(minTop, Math.min(maxTop, top));
    tooltip.style.top  = top + 'px';
    tooltip.style.left = left + 'px';
  }

  scrollIntoUsefulView(positionEverything);
}
function tourNext() {
  document.getElementById('tourTooltip').classList.remove('active');
  _tourIndex++;
  if (_tourIndex >= _activeTourSteps.length) { closeTour(); return; }
  setTimeout(showTourStep, 200);
}
function tourBack() {
  document.getElementById('tourTooltip').classList.remove('active');
  _tourIndex = Math.max(0, _tourIndex - 1);
  setTimeout(showTourStep, 200);
}
function closeTour(skipped) {
  const firstRun = localStorage.getItem(BRAND_TOUR_KEY) !== '1';
  const welcome = document.getElementById('welcomeBanner');
  if (welcome && welcome.dataset.forcedForTour === '1' && !firstRun) {
    delete welcome.dataset.forcedForTour;
  }
  if (skipped && firstRun) {
    const next = document.getElementById('tourNextBtn');
    if (next && next.animate) {
      next.animate([
        { transform: 'translateX(0)' }, { transform: 'translateX(-6px)' }, { transform: 'translateX(6px)' },
        { transform: 'translateX(-4px)' }, { transform: 'translateX(4px)' }, { transform: 'translateX(0)' },
      ], { duration: 380 });
    }
    return;
  }
  document.getElementById('tourBackdrop')?.classList.remove('active');
  const sp = document.getElementById('tourSpotlight'); if (sp) sp.style.display = 'none';
  const tp = document.getElementById('tourTooltip'); if (tp) { tp.style.display = 'none'; tp.classList.remove('active'); }
  const fab = document.getElementById('tourFab'); if (fab) fab.style.display = 'flex';
  localStorage.setItem(BRAND_TOUR_KEY, '1');
}
window.startTour = startTour;
window.closeTour = closeTour;
window.replayTour = function() {
  localStorage.removeItem(BRAND_TOUR_KEY);
  const fab = document.getElementById('tourFab'); if (fab) fab.style.display = 'none';
  startTour(true);
};
// Auto-fire after data loaded (we hook into the existing load chain)
window.maybeStartBrandTour = function() {
  const fab = document.getElementById('tourFab'); if (fab) fab.style.display = 'none';
  setTimeout(() => { startTour(false); const f = document.getElementById('tourFab'); if (f) f.style.display = 'flex'; }, 800);
};

window.editBrandNameInline = function(e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  const el = document.getElementById('navName');
  if (!el || el.dataset.editing === '1') return;
  const originalName = (_data && _data.profile && _data.profile.company_name) || el.textContent.trim();
  el.dataset.editing = '1';
  el.contentEditable = 'plaintext-only';
  el.spellcheck = false;
  el.textContent = originalName;
  // Select all
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  el.focus();

  const commit = async function() {
    const clean = (el.textContent || '').trim().slice(0, 120);
    el.contentEditable = 'false';
    el.dataset.editing = '';
    if (!clean || clean === originalName) {
      el.textContent = originalName;
      return;
    }
    try {
      await _brandApi('profile-update', { company_name: clean });
      if (_data && _data.profile) _data.profile.company_name = clean;
      el.textContent = clean;
    } catch (err) {
      el.textContent = originalName;
      const toast = document.createElement('div');
      toast.textContent = 'Rename failed: ' + (err.message || 'unknown');
      toast.style.cssText = 'position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#a14e2a; color:white; padding:10px 18px; border-radius:8px; font-size:0.9rem; z-index:10000;';
      document.body.appendChild(toast);
      setTimeout(function() { toast.remove(); }, 3000);
    }
  };

  el.addEventListener('keydown', function(ev) {
    if (ev.key === 'Enter') { ev.preventDefault(); el.blur(); }
