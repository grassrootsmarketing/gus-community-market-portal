<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Demohub</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --forest-900: #0f2c17; --forest-700: #1f4a26; --forest-600: #2a5b32; --forest-500: #3a7142;
  --forest-100: #e3edd6; --forest-50: #f4f7ef;
  --cream-50: #fbf7f0; --cream-100: #f6f0e4;
  --clay-700: #a14e2a; --clay-bright: #ed682f;
  --ink-900: #1c1c1a; --ink-700: #3a3a36; --ink-500: #6b6a64;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--cream-50); color: var(--ink-900); line-height: 1.55; min-height: 100vh; }
.nav { padding: 24px 32px; display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: 0 auto; }
.nav .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.nav .brand-mark { width: 32px; height: 32px; }
.nav .brand-text { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 1.25rem; letter-spacing: -0.04em; color: var(--forest-900); }
.nav .signup-link { font-size: 0.9rem; color: var(--ink-500); text-decoration: none; }
.container { max-width: 480px; margin: 80px auto 80px; padding: 0 24px; }
.eyebrow { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.18em; color: var(--clay-700); margin-bottom: 18px; }
h1 { font-family: 'Fraunces', Georgia, serif; font-size: 2.4rem; font-weight: 400; line-height: 1.1; letter-spacing: -0.02em; color: var(--forest-900); margin-bottom: 14px; }
.lede { font-size: 1.05rem; color: var(--ink-700); margin-bottom: 32px; }
.card { background: white; border: 1px solid rgba(15,44,23,0.08); border-radius: 16px; padding: 32px; box-shadow: 0 1px 3px rgba(15,44,23,0.04); }
.label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--forest-900); margin-bottom: 6px; }
.url-prefix { display: flex; align-items: center; border: 1.5px solid rgba(15,44,23,0.12); border-radius: 10px; overflow: hidden; transition: border-color 0.15s; background: white; }
.url-prefix:focus-within { border-color: var(--forest-500); }
.url-prefix .prefix { padding: 12px 4px 12px 14px; color: var(--ink-500); font-size: 0.95rem; font-family: 'Plus Jakarta Sans', monospace; white-space: nowrap; user-select: none; }
.url-prefix input { flex: 1; border: none; outline: none; padding: 12px 14px 12px 4px; font-size: 0.95rem; font-family: 'Plus Jakarta Sans', monospace; background: transparent; color: var(--ink-900); }
.hint { font-size: 0.82rem; color: var(--ink-500); margin-top: 8px; }
.btn { width: 100%; padding: 14px 20px; background: var(--forest-900); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.15s; font-family: inherit; margin-top: 18px; }
.btn:hover { background: var(--forest-700); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.error { background: #fdebe5; color: var(--clay-700); padding: 12px 16px; border-radius: 8px; font-size: 0.9rem; margin-top: 14px; display: none; }
.divider { display: flex; align-items: center; gap: 12px; margin: 28px 0 20px; color: var(--ink-500); font-size: 0.82rem; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(15,44,23,0.08); }
.alt-links { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.alt-link { padding: 14px 16px; background: var(--forest-50); border-radius: 10px; text-decoration: none; color: var(--forest-900); font-size: 0.9rem; text-align: center; transition: background 0.15s; }
.alt-link:hover { background: var(--forest-100); }
.alt-link strong { display: block; font-weight: 600; margin-bottom: 2px; }
.alt-link small { color: var(--ink-500); font-size: 0.78rem; }
</style>

</head>
<body>

<nav class="nav">
  <a href="/" class="brand">
    <svg class="brand-mark" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
      <circle cx="36" cy="36" r="36" fill="#0f2c17"/>
      <circle cx="36" cy="40" r="18" fill="#ed682f"/>
      <rect x="34.5" y="14" width="3" height="10" rx="1.2" fill="#fbf3e0"/>
      <path d="M37 17 Q45 14 48 20 Q44 22 38 21 Q35 19 37 17 Z" fill="#87b08e"/>
    </svg>
    <span class="brand-text">demohub</span>
  </a>
  <a href="/signup" class="signup-link">New here? Sign up →</a>
</nav>

<main class="container">
  <div class="eyebrow">Sign in</div>
  <h1>Open your admin</h1>
  <p class="lede">Type your business handle to go to your admin hub.</p>

  <div class="card">
    <form id="signinForm">
      <label class="label" for="slug">Your handle</label>
      <div class="url-prefix">
        <span class="prefix">demohubhq.com/r/</span>
        <input id="slug" type="text" placeholder="your-business" required autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      </div>
      <div class="hint">This is the part after <code>/r/</code> in your admin URL — it was sent to you in your welcome email.</div>
      <button class="btn" type="submit" id="goBtn">Continue &rarr;</button>
      <div class="error" id="errBox"></div>
    </form>

    <div class="divider">or</div>

    <div class="alt-links">
      <a href="/signup" class="alt-link">
        <strong>Sign up</strong>
        <small>Create a new store</small>
      </a>
      <a href="/brand/signin" class="alt-link">
        <strong>I'm a brand</strong>
        <small>Brand portal sign in</small>
      </a>
    </div>
  </div>
</main>

<script>
const form = document.getElementById('signinForm');
const slugInput = document.getElementById('slug');
const errBox = document.getElementById('errBox');
const btn = document.getElementById('goBtn');

function normalize(s) {
  return String(s || '').trim().toLowerCase().replace(/^https?:\/\//, '').replace(/^[^/]*\/r\//, '').replace(/[^a-z0-9-]/g, '');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errBox.style.display = 'none';
  const slug = normalize(slugInput.value);
  if (!slug) { errBox.textContent = 'Enter your handle to continue.'; errBox.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Checking…';
  try {
    // Verify the retailer exists before redirecting (better UX than 404)
    const r = await fetch('/api/find-retailer?slug=' + encodeURIComponent(slug));
    if (r.ok) {
      window.location.href = '/r/' + slug + '/admin';
    } else if (r.status === 404) {
      errBox.textContent = "We couldn't find a business with that handle. Check the spelling, or sign up to create one.";
      errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Continue →';
    } else {
      // Fallback: try to navigate anyway
      window.location.href = '/r/' + slug + '/admin';
    }
  } catch (e) {
    // Network error — best-effort redirect
    window.location.href = '/r/' + slug + '/admin';
  }
});

// Pre-fill if URL has ?slug=
const params = new URLSearchParams(location.search);
const preset = params.get('slug');
if (preset) slugInput.value = normalize(preset);
</script>

</body>
</html>
